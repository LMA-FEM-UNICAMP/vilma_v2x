<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VILMA HMI</title>
  <link rel="icon" type="image/png" href="Logo_LMA_icon.png">
  <style>
    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      text-align: center;
      font-family: Lato;
      padding: 20px;
      display: flex;
      flex-direction: column;
      /* overflow: hidden;  */
    }

    .button_idle {
      width: 150px;
      padding: 25px 0px;
      margin: 12px;
      background: #22314E;
      color: white;
      border: 2px solid #ddd;
      border-radius: 10px;
      font-size: 20px;
      font-weight: bold;
      font-family: Lato, sans-serif;
    }

    .button_off {
      width: 150px;
      padding: 25px 0px;
      margin: 12px;
      background: #22314E;
      color: #22314E;
      border: 2px solid #ddd;
      border-radius: 10px;
      font-size: 20px;
      font-weight: bold;
      font-family: Lato, sans-serif;
    }

    .button_selected {
      width: 150px;
      padding: 25px 0px;
      margin: 12px;
      background: #0057f3;
      color: white;
      border: 2px solid #ddd;
      border-radius: 10px;
      font-size: 20px;
      font-weight: bold;
      font-family: Lato, sans-serif;
    }

    .display-box {
      border: 1px solid #ddd;
      padding: 15px;
      margin: 10px auto;
      border-radius: 8px;
    }

    .display-box {
      width: 350px;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      text-align: center;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      background: #f9f9f9;
      font-family: Lato, sans-serif;
    }

    .display-box .title {
      font-size: 12px;
      font-weight: bold;
      margin-bottom: 5px;
      color: #555;
    }

    .display-box .value {
      font-size: 72px;
      font-weight: normal;
      color: #222;
    }

    .display-box .valuesmall {
      font-size: 14px;
      font-weight: normal;
      color: #222;
    }

    .content {
      flex: 1;
      font-family: Lato, sans-serif;
    }

    .footer {
      background-color: #fff;
      padding: 15px;
      text-align: center;
    }

    .footer-logo {
      display: block;
      margin: 0 auto 10px;
      width: 200px;
      height: auto;
    }
  </style>
</head>

<body>

  <div class=content>

    <h1>VILMA HMI</h1>

    <div class="display-box">
      <div class="title">Status</div>
      <div class="valuesmall" id="statusBox">Waiting ROS data...</div>
    </div>

    <div class="display-box">
      <div class="title">Speed</div>
      <div class="value" id="speedBox">34.3 km/h</div>
    </div>

    <div class="display-box">
      <div class="title">Throttle</div>
      <div class="value" id="throttleBox">90%</div>
    </div>

    <div class="display-box">
      <div class="title">Braking</div>
      <div class="value" id="brakingBox">-</div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/roslib/build/roslib.min.js"></script>
  <script>

    const button_start = document.getElementById("button_start");
    const button_stop = document.getElementById("button_stop");

    let ros_connected = false;
    let intervalId = null;
    let timeoutId = null;

    const publish_period_ms = 500;
    const timeout_ms = 2500;

    let rosServerIpPort = "143.106.207.89:9090";

    // ROS server object
    let ros = new ROSLIB.Ros();

    // Publisher for commands
    let commandTopic = new ROSLIB.Topic();

    // Subscriber for status updates
    let speedTopic = new ROSLIB.Topic();
    let throttleTopic = new ROSLIB.Topic();
    let brakingTopic = new ROSLIB.Topic();

    async function loadConfigAndStart() {

      try {
        const res = await fetch('/config.json');      // waits until fetch is done
        const cfg = await res.json();                 // waits until JSON is parsed
        rosServerIpPort = cfg.serviceIp;
        console.log("JSON READ:", cfg.serviceIp);
      } catch (err) {
        console.error("Error loading config:", err);
      }

      // Get ROSBridge server IP and port
      console.log("rosServerIpPort" + rosServerIpPort);

      // Connect to ROS bridge
      let rosServerUrl = "ws://" + rosServerIpPort;

      ros = new ROSLIB.Ros({
        url: rosServerUrl
      });

      ros.on('connection', () => console.log('Connected to ROS'));
      ros.on('error', (error) => console.log('Error: ', error));
      ros.on('close', () => console.log('Connection closed.'));

      // Configure subscribers
      statusTopic = new ROSLIB.Topic({
        ros: ros,
        name: '/hmi/status',
        messageType: 'std_msgs/String'
      });
      speedTopic = new ROSLIB.Topic({
        ros: ros,
        name: '/hmi/speed',
        messageType: 'std_msgs/Float32'
      });
      throttleTopic = new ROSLIB.Topic({
        ros: ros,
        name: '/hmi/throttle',
        messageType: 'std_msgs/Float32'
      });
      brakingTopic = new ROSLIB.Topic({
        ros: ros,
        name: '/hmi/braking',
        messageType: 'std_msgs/Float32'
      });

      // Subscribers callbacks

      statusTopic.subscribe((message) => {
        resetTimeout();
        document.getElementById('statusBox').innerText = message.data;
      });

      throttleTopic.subscribe((message) => {
        document.getElementById('throttleBox').innerText = message.data.toFixed(2) + ' %';
        resetTimeout();
      });

      brakingTopic.subscribe((message) => {
        document.getElementById('brakingBox').innerText = message.data.toFixed(2) + ' %';
        resetTimeout();
      });

      speedTopic.subscribe((message) => {
        document.getElementById('speedBox').innerText = message.data.toFixed(1) * 3.6 + ' km/h';
        resetTimeout();
      });

    }

    function resetTimeout() {
      if (timeoutId) {
        clearTimeout(timeoutId);
        document.getElementById('statusBox').style.cssText = "";
        document.getElementById('statusBox').innerText = "Receiving data...";
      }

      timeoutId = setTimeout(() => {
        document.getElementById('statusBox').innerText = "Communication timeout!!!";
        document.getElementById('statusBox').style.color = "red";
        document.getElementById('statusBox').style.fontWeight = "bold";
        document.getElementById('statusBox').style.fontSize = "20px";
        console.log('Communication timeout!');
      }, timeout_ms);
    }

    loadConfigAndStart();


  </script>
</body>

<footer class="footer">
  <img src="Logo_LMA_trim.png" alt="Logo" class="footer-logo">
  <p>Laboratory of Autonomous Mobility (LMA)</p>
</footer>

</html>
