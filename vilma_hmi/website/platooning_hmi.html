<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VILMA HMI</title>
  <link rel="icon" type="image/png" href="Logo_LMA_icon.png">
  <style>
    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      text-align: center;
      font-family: Lato;
      padding: 20px;
      display: flex;
      flex-direction: column;
      /* overflow: hidden;  */
    }

    .button_idle {
      width: 150px;
      padding: 25px 0px;
      margin: 12px;
      background: #22314E;
      color: white;
      border: 2px solid #ddd;
      border-radius: 10px;
      font-size: 20px;
      font-weight: bold;
      font-family: Lato, sans-serif;
    }

    .button_off {
      width: 150px;
      padding: 25px 0px;
      margin: 12px;
      background: #22314E;
      color: #22314E;
      border: 2px solid #ddd;
      border-radius: 10px;
      font-size: 20px;
      font-weight: bold;
      font-family: Lato, sans-serif;
    }

    .button_selected {
      width: 150px;
      padding: 25px 0px;
      margin: 12px;
      background: #0057f3;
      color: white;
      border: 2px solid #ddd;
      border-radius: 10px;
      font-size: 20px;
      font-weight: bold;
      font-family: Lato, sans-serif;
    }

    .display-box {
      border: 1px solid #ddd;
      padding: 15px;
      margin: 10px auto;
      border-radius: 8px;
    }

    .display-box {
      width: 300px;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      text-align: center;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      background: #f9f9f9;
      font-family: Lato, sans-serif;
    }

    .display-box .title {
      font-size: 12px;
      font-weight: bold;
      margin-bottom: 5px;
      color: #555;
    }

    .display-box .value {
      font-size: 20px;
      font-weight: normal;
      color: #222;
    }

    .display-box .valuesmall {
      font-size: 14px;
      font-weight: normal;
      color: #222;
    }

    .content {
      flex: 1;
      font-family: Lato, sans-serif;
    }

    .footer {
      background-color: #fff;
      padding: 15px;
      text-align: center;
    }

    .footer-logo {
      display: block;
      margin: 0 auto 10px;
      width: 200px;
      height: auto;
    }
  </style>
</head>

<body>

  <div class=content>

    <h1>VILMA HMI</h1>

    <div class="display-box">
      <div class="title">Status</div>
      <div class="valuesmall" id="statusBox">Waiting ROS data...</div>
    </div>

    <div class="display-box">
      <div class="title">Distance</div>
      <div class="value" id="distanceBox">-</div>
    </div>

    <div class="display-box">
      <div class="title">Speed</div>
      <div class="value" id="speedBox">-</div>
    </div>

    <div class="display-box">
      <div class="title">Throttle</div>
      <div class="value" id="throttleBox">-</div>
    </div>

    <div class="display-box">
      <div class="title">Braking</div>
      <div class="value" id="brakingBox">-</div>
    </div>

    <button id="button_start" class="button_off" onclick="sendCommand(2)">Start</button>
    <button id="button_stop" class="button_off" onclick="sendCommand(1)">Stop</button>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/roslib/build/roslib.min.js"></script>
  <script>

    const button_start = document.getElementById("button_start");
    const button_stop = document.getElementById("button_stop");

    let ros_connected = false;
    let intervalId = null;

    let rosServerIpPort = "143.106.207.89:9090";

    // ROS server object
    let ros = new ROSLIB.Ros();

    // Publisher for commands
    let commandTopic = new ROSLIB.Topic();

    // Subscriber for status updates
    let statusTopic = new ROSLIB.Topic();
    let distanceTopic = new ROSLIB.Topic();
    let speedTopic = new ROSLIB.Topic();
    let throttleTopic = new ROSLIB.Topic();
    let brakingTopic = new ROSLIB.Topic();

    async function loadConfigAndStart() {

      try {
        const res = await fetch('/config.json');      // waits until fetch is done
        const cfg = await res.json();                 // waits until JSON is parsed
        rosServerIpPort = cfg.serviceIp;
        console.log("JSON READ:", cfg.serviceIp);
      } catch (err) {
        console.error("Error loading config:", err);
      }

      // Get ROSBridge server IP and port
      console.log("rosServerIpPort" + rosServerIpPort);

      // Connect to ROS bridge
      let rosServerUrl = "ws://" + rosServerIpPort;

      ros = new ROSLIB.Ros({
        url: rosServerUrl
      });

      ros.on('connection', () => console.log('Connected to ROS'));
      ros.on('error', (error) => console.log('Error: ', error));
      ros.on('close', () => console.log('Connection closed.'));

      // Configure publishers
      commandTopic = new ROSLIB.Topic({
        ros: ros,
        name: '/hmi/engage',
        messageType: 'std_msgs/UInt16'
      });

      // Configure subscribers
      statusTopic = new ROSLIB.Topic({
        ros: ros,
        name: '/hmi/status',
        messageType: 'std_msgs/String'
      });
      distanceTopic = new ROSLIB.Topic({
        ros: ros,
        name: '/hmi/distance',
        messageType: 'std_msgs/Float32'
      });
      speedTopic = new ROSLIB.Topic({
        ros: ros,
        name: '/hmi/follower_speed',
        messageType: 'std_msgs/Float32'
      });
      throttleTopic = new ROSLIB.Topic({
        ros: ros,
        name: '/hmi/throttle',
        messageType: 'std_msgs/Float32'
      });
      brakingTopic = new ROSLIB.Topic({
        ros: ros,
        name: '/hmi/braking',
        messageType: 'std_msgs/Float32'
      });

      // Subscribers callbacks
      statusTopic.subscribe((message) => {
        document.getElementById('statusBox').innerText = message.data;
        if (!ros_connected) {
          button_start.className = "button_idle";
          button_stop.className = "button_idle";
        }
        ros_connected = true;
      });

      distanceTopic.subscribe((message) => {
        document.getElementById('distanceBox').innerText = message.data.toFixed(2) + ' m';
      });

      throttleTopic.subscribe((message) => {
        document.getElementById('throttleBox').innerText = message.data.toFixed(2) + ' %';
      });

      brakingTopic.subscribe((message) => {
        document.getElementById('brakingBox').innerText = message.data.toFixed(2) + ' %';
      });

      speedTopic.subscribe((message) => {
        document.getElementById('speedBox').innerText = message.data.toFixed(2) * 3.6 + ' km/h';
      });


      button_start.addEventListener("click", function () {
        if (ros_connected) {
          button_start.className = "button_selected";
          button_stop.className = "button_idle";
        }
      });

      button_stop.addEventListener("click", function () {
        if (ros_connected) {
          button_stop.className = "button_selected";
          button_start.className = "button_idle";
        }
      });

    }


    // Publish function
    function sendCommand(action) {
      if (ros_connected) {
        if (intervalId !== null) {
          clearInterval(intervalId);
        }
        intervalId = setInterval(() => {
          const msg = new ROSLIB.Message({ data: action });
          commandTopic.publish(msg);
          console.log(`Published: ${msg.data}`);
        }, 500);
      }
    }

    loadConfigAndStart();


  </script>
</body>

<footer class="footer">
  <img src="Logo_LMA_trim.png" alt="Logo" class="footer-logo">
  <p>Laboratory of Autonomous Mobility (LMA)</p>
</footer>

</html>
