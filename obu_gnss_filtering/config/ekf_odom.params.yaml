ekf_filter_node:
  ros__parameters:
    frequency: 50.0
    sensor_timeout: 0.1
    two_d_mode: true
    publish_tf: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    # ---------------- IMU ----------------
    imu0: /imu/data
    imu0_differential: false
    imu0_relative: false

    imu0_config: [false, false, false,
                  false, false, true,    # yaw
                  false, false, false,
                  false, false, true,    # yaw rate
                  true, false, false]    # accel x

    imu0_remove_gravitational_acceleration: true

    # ---------------- VELOCITY ----------------
    twist0: /vehicle/twist
    twist0_differential: false
    twist0_relative: false

    twist0_config: [true, false, false,   # vx only
                    false, false, false,
                    false, false, false,
                    false, false, false,
                    false, false, false]

    # Process noise (automotive tuned)
    process_noise_covariance: [0.05, 0, 0,   0, 0, 0,
                               0, 0.05, 0,   0, 0, 0,
                               0, 0, 0.01,   0, 0, 0,
                               0, 0, 0,   0.01, 0, 0,
                               0, 0, 0,   0, 0.01, 0,
                               0, 0, 0,   0, 0, 0.02]